name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Deploy Cloudflare worker and set proxy URL
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKERS_SUBDOMAIN: ${{ secrets.CLOUDFLARE_WORKERS_SUBDOMAIN }}
          PROXY_FROM_SECRET: ${{ secrets.VITE_MCCI_PROXY_URL }}
          MCCI_API_KEY: ${{ secrets.VITE_MCCI_API_KEY }}
        run: |
          set -e
          PROXY_URL=""

          if [ -n "$PROXY_FROM_SECRET" ]; then
            PROXY_URL="$PROXY_FROM_SECRET"
            echo "Using VITE_MCCI_PROXY_URL from GitHub secrets"
          elif [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Add GitHub Actions secret CLOUDFLARE_API_TOKEN (or VITE_MCCI_PROXY_URL if the worker is already deployed). See workers/README.md"
            exit 1
          else
            npm install -g wrangler@3
            export CLOUDFLARE_API_TOKEN

            if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
              echo "Looking up Cloudflare account ID..."
              CLOUDFLARE_ACCOUNT_ID=$(wrangler whoami 2>/dev/null | grep -oE '[a-f0-9]{32}' | head -1 || true)
            fi
            if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
              echo "::error::Add GitHub secret CLOUDFLARE_ACCOUNT_ID (Cloudflare dashboard, right sidebar on any site)"
              exit 1
            fi
            export CLOUDFLARE_ACCOUNT_ID

            if [ -n "$MCCI_API_KEY" ]; then
              echo "$MCCI_API_KEY" | wrangler secret put MCCI_API_KEY --name ie-mcci-proxy || true
            fi

            echo "Deploying ie-mcci-proxy worker..."
            DEPLOY_LOG=$(wrangler deploy 2>&1 | tee ../worker-deploy.log)
            echo "$DEPLOY_LOG"
            PROXY_URL=$(echo "$DEPLOY_LOG" | grep -oE 'https://[a-zA-Z0-9-]+\.[a-zA-Z0-9-]+\.workers\.dev' | head -1 || true)

            if [ -z "$PROXY_URL" ] && [ -n "$WORKERS_SUBDOMAIN" ]; then
              PROXY_URL="https://ie-mcci-proxy.${WORKERS_SUBDOMAIN}.workers.dev"
            fi
          fi

          if [ -z "$PROXY_URL" ]; then
            echo "::error::Could not find worker URL. After wrangler deploy, add secret VITE_MCCI_PROXY_URL with the https://ie-mcci-proxy....workers.dev URL"
            exit 1
          fi

          echo "Using proxy: $PROXY_URL"
          echo "VITE_MCCI_PROXY_URL=$PROXY_URL" >> "$GITHUB_ENV"

      - uses: actions/configure-pages@v5

      - name: Build for GitHub Pages
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          VITE_MCCI_PROXY_URL: ${{ env.VITE_MCCI_PROXY_URL }}
          VITE_MCCI_API_KEY: ${{ secrets.VITE_MCCI_API_KEY }}

      - name: Verify proxy is in the build
        run: |
          if ! grep -rq 'workers.dev' dist/assets/*.js; then
            echo "Build does not include the proxy URL."
            exit 1
          fi

      - name: Verify build output
        run: |
          if grep -q 'src/main.jsx' dist/index.html; then
            echo "dist/index.html still points at dev sources, build misconfigured"
            exit 1
          fi
          grep -q '/IEtracker/assets/' dist/index.html

      - run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Deploy Cloudflare worker
        id: worker
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers
          command: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set worker API key on Cloudflare
        if: steps.worker.outcome == 'success'
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MCCI_API_KEY: ${{ secrets.VITE_MCCI_API_KEY }}
        run: |
          if [ -z "$MCCI_API_KEY" ]; then
            echo "VITE_MCCI_API_KEY secret missing, skip worker secret"
            exit 0
          fi
          npm install -g wrangler
          echo "$MCCI_API_KEY" | wrangler secret put MCCI_API_KEY --name ie-mcci-proxy

      - name: Pick proxy URL for build
        env:
          WORKERS_SUBDOMAIN: ${{ secrets.CLOUDFLARE_WORKERS_SUBDOMAIN }}
          PROXY_FROM_SECRET: ${{ secrets.VITE_MCCI_PROXY_URL }}
        run: |
          PROXY_URL=""
          if [ -n "$PROXY_FROM_SECRET" ]; then
            PROXY_URL="$PROXY_FROM_SECRET"
          elif [ -n "$WORKERS_SUBDOMAIN" ]; then
            PROXY_URL="https://ie-mcci-proxy.${WORKERS_SUBDOMAIN}.workers.dev"
          fi
          if [ -z "$PROXY_URL" ]; then
            echo "::error::Add GitHub secrets: CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID + CLOUDFLARE_WORKERS_SUBDOMAIN (or VITE_MCCI_PROXY_URL). See workers/README.md"
            exit 1
          fi
          echo "Using proxy: $PROXY_URL"
          echo "VITE_MCCI_PROXY_URL=$PROXY_URL" >> "$GITHUB_ENV"

      - uses: actions/configure-pages@v5

      - name: Build for GitHub Pages
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          VITE_MCCI_PROXY_URL: ${{ env.VITE_MCCI_PROXY_URL }}
          VITE_MCCI_API_KEY: ${{ secrets.VITE_MCCI_API_KEY }}

      - name: Verify proxy is in the build
        run: |
          if ! grep -rq 'workers.dev' dist/assets/*.js; then
            echo "Build does not include the proxy URL. Check VITE_MCCI_PROXY_URL."
            exit 1
          fi

      - name: Verify build output
        run: |
          if grep -q 'src/main.jsx' dist/index.html; then
            echo "dist/index.html still points at dev sources, build misconfigured"
            exit 1
          fi
          grep -q '/IEtracker/assets/' dist/index.html

      - run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/configure-pages@v5

      - name: Build for GitHub Pages
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          # proxy url fixes cors; api key can live on the worker instead
          VITE_MCCI_PROXY_URL: ${{ secrets.VITE_MCCI_PROXY_URL }}
          VITE_MCCI_API_KEY: ${{ secrets.VITE_MCCI_API_KEY }}

      # fail early if we accidentally uploaded the dev index.html
      - name: Verify build output
        run: |
          if grep -q 'src/main.jsx' dist/index.html; then
            echo "dist/index.html still points at dev sources — build misconfigured"
            exit 1
          fi
          grep -q '/IEtracker/assets/' dist/index.html

      - run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Deploy Cloudflare worker (optional)
        id: worker
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MCCI_API_KEY: ${{ secrets.VITE_MCCI_API_KEY }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "No CLOUDFLARE_API_TOKEN secret, skipping worker deploy"
            exit 0
          fi
          npm install -g wrangler
          if [ -n "$MCCI_API_KEY" ]; then
            echo "$MCCI_API_KEY" | wrangler secret put MCCI_API_KEY
          fi
          DEPLOY_LOG=$(wrangler deploy 2>&1 | tee ../worker-deploy.log)
          echo "$DEPLOY_LOG"
          PROXY_URL=$(echo "$DEPLOY_LOG" | grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' | head -1)
          echo "proxy_url=$PROXY_URL" >> "$GITHUB_OUTPUT"

      - name: Pick proxy URL for build
        env:
          PROXY_FROM_WORKER: ${{ steps.worker.outputs.proxy_url }}
          PROXY_FROM_SECRET: ${{ secrets.VITE_MCCI_PROXY_URL }}
        run: |
          if [ -n "$PROXY_FROM_WORKER" ]; then
            echo "VITE_MCCI_PROXY_URL=$PROXY_FROM_WORKER" >> "$GITHUB_ENV"
          elif [ -n "$PROXY_FROM_SECRET" ]; then
            echo "VITE_MCCI_PROXY_URL=$PROXY_FROM_SECRET" >> "$GITHUB_ENV"
          fi

      - uses: actions/configure-pages@v5

      - name: Build for GitHub Pages
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          VITE_MCCI_PROXY_URL: ${{ env.VITE_MCCI_PROXY_URL }}
          VITE_MCCI_API_KEY: ${{ secrets.VITE_MCCI_API_KEY }}

      # fail early if we accidentally uploaded the dev index.html
      - name: Verify build output
        run: |
          if grep -q 'src/main.jsx' dist/index.html; then
            echo "dist/index.html still points at dev sources, build misconfigured"
            exit 1
          fi
          grep -q '/IEtracker/assets/' dist/index.html

      - run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
